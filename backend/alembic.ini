# Alembic configuration for ComplAI
# Run migrations with: alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os   # Use os.pathsep for cross-platform

# Use the DATABASE_URL from .env — overridden by env.py
sqlalchemy.url = postgresql://postgres:selvester1@localhost:5432/complai_qa

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
